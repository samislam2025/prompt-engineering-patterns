<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" width="1000" height="500" role="img" aria-label="Pattern hierarchy diagram">
  <defs>
    <linearGradient id="foundationalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="intermediateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="advancedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="productionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="500" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="500" y="40" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#0F172A" text-anchor="middle">Pattern Hierarchy — How the Categories Build on Each Other</text>
  <text x="500" y="65" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#64748B" text-anchor="middle">Each tier assumes mastery of the tier before it</text>

  <!-- Tier 1: Foundational -->
  <g>
    <rect x="80" y="130" width="200" height="280" rx="14" fill="url(#foundationalGrad)"/>
    <text x="180" y="165" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">🧱</text>
    <text x="180" y="195" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">FOUNDATIONAL</text>
    <line x1="110" y1="210" x2="250" y2="210" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <text x="180" y="235" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Chain-of-Thought</text>
    <text x="180" y="255" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Few-Shot Examples</text>
    <text x="180" y="275" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Role Assignment</text>
    <text x="180" y="295" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Output Formatting</text>
    <text x="180" y="315" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Decomposition</text>
    <line x1="110" y1="340" x2="250" y2="340" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <text x="180" y="365" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#FFFFFF" text-anchor="middle" font-style="italic">Control the basics:</text>
    <text x="180" y="385" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#FFFFFF" text-anchor="middle" font-style="italic">reasoning, format, tone</text>
  </g>

  <!-- Tier 2: Intermediate -->
  <g>
    <rect x="300" y="130" width="200" height="280" rx="14" fill="url(#intermediateGrad)"/>
    <text x="400" y="165" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">⚡</text>
    <text x="400" y="195" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">INTERMEDIATE</text>
    <line x1="330" y1="210" x2="470" y2="210" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <text x="400" y="235" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Self-Consistency</text>
    <text x="400" y="255" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Constraint Setting</text>
    <text x="400" y="275" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Negative Examples</text>
    <text x="400" y="295" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Context Management</text>
    <text x="400" y="315" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Temperature Strategy</text>
    <line x1="330" y1="340" x2="470" y2="340" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <text x="400" y="365" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#FFFFFF" text-anchor="middle" font-style="italic">Handle complexity:</text>
    <text x="400" y="385" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#FFFFFF" text-anchor="middle" font-style="italic">edge cases, reliability</text>
  </g>

  <!-- Tier 3: Advanced -->
  <g>
    <rect x="520" y="130" width="200" height="280" rx="14" fill="url(#advancedGrad)"/>
    <text x="620" y="165" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">🔬</text>
    <text x="620" y="195" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">ADVANCED</text>
    <line x1="550" y1="210" x2="690" y2="210" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <text x="620" y="235" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">System Architecture</text>
    <text x="620" y="255" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Guardrails</text>
    <text x="620" y="275" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Verification Chains</text>
    <text x="620" y="295" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Prompt Pipelines</text>
    <text x="620" y="315" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Dynamic Few-Shot</text>
    <line x1="550" y1="340" x2="690" y2="340" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <text x="620" y="365" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#FFFFFF" text-anchor="middle" font-style="italic">Build systems:</text>
    <text x="620" y="385" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#FFFFFF" text-anchor="middle" font-style="italic">architecture, safety, scale</text>
  </g>

  <!-- Tier 4: Production -->
  <g>
    <rect x="740" y="130" width="200" height="280" rx="14" fill="url(#productionGrad)"/>
    <text x="840" y="165" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">🏭</text>
    <text x="840" y="195" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">PRODUCTION</text>
    <line x1="770" y1="210" x2="910" y2="210" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <text x="840" y="235" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Eval-Driven Iteration</text>
    <text x="840" y="255" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Regression Testing</text>
    <text x="840" y="275" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Multi-Model Routing</text>
    <text x="840" y="295" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Graceful Degradation</text>
    <text x="840" y="315" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="400" fill="#FFFFFF" text-anchor="middle">Prompt Versioning</text>
    <line x1="770" y1="340" x2="910" y2="340" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
    <text x="840" y="365" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#FFFFFF" text-anchor="middle" font-style="italic">Ship and maintain:</text>
    <text x="840" y="385" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#FFFFFF" text-anchor="middle" font-style="italic">monitoring, ops, rollback</text>
  </g>

  <!-- Arrows between tiers -->
  <line x1="283" y1="270" x2="298" y2="270" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="503" y1="270" x2="518" y2="270" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="723" y1="270" x2="738" y2="270" stroke="#64748B" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Bottom progression labels -->
  <text x="180" y="445" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#64748B" text-anchor="middle">Prototype</text>
  <text x="400" y="445" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#64748B" text-anchor="middle">Reliable</text>
  <text x="620" y="445" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#64748B" text-anchor="middle">Robust</text>
  <text x="840" y="445" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#64748B" text-anchor="middle">Operational</text>

  <!-- Bottom bar gradient -->
  <rect x="80" y="460" width="860" height="4" rx="2" fill="#CBD5E1"/>
  <rect x="80" y="460" width="200" height="4" rx="2" fill="#3B82F6"/>
  <rect x="280" y="460" width="220" height="4" rx="2" fill="#F59E0B"/>
  <rect x="500" y="460" width="220" height="4" rx="2" fill="#8B5CF6"/>
  <rect x="720" y="460" width="220" height="4" rx="2" fill="#10B981"/>

  <text x="500" y="488" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Progression from demo-ready to production-ready AI systems</text>
</svg>
