<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Prompt Engineering Patterns banner">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="33%" stop-color="#F59E0B"/>
      <stop offset="66%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGradient)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#1E293B" stroke-width="1" opacity="0.4">
    <line x1="0" y1="75" x2="1200" y2="75"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="225" x2="1200" y2="225"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- Decorative geometric shapes (pattern blocks) -->
  <g opacity="0.85">
    <!-- Foundational (blue) -->
    <rect x="60" y="110" width="70" height="70" rx="10" fill="#3B82F6"/>
    <text x="95" y="155" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#FFFFFF" text-anchor="middle" font-weight="700">01</text>

    <!-- Intermediate (amber) -->
    <rect x="140" y="110" width="70" height="70" rx="10" fill="#F59E0B"/>
    <text x="175" y="155" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#FFFFFF" text-anchor="middle" font-weight="700">02</text>

    <!-- Advanced (purple) -->
    <rect x="1000" y="110" width="70" height="70" rx="10" fill="#8B5CF6"/>
    <text x="1035" y="155" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#FFFFFF" text-anchor="middle" font-weight="700">03</text>

    <!-- Production (green) -->
    <rect x="1080" y="110" width="70" height="70" rx="10" fill="#10B981"/>
    <text x="1115" y="155" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#FFFFFF" text-anchor="middle" font-weight="700">04</text>
  </g>

  <!-- Main title -->
  <text x="600" y="135" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="url(#titleGradient)" text-anchor="middle" letter-spacing="-1">Prompt Engineering Patterns</text>

  <!-- Subtitle -->
  <text x="600" y="175" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="400" fill="#94A3B8" text-anchor="middle" letter-spacing="0.5">20 production-tested patterns for building with LLMs</text>

  <!-- Accent line -->
  <rect x="400" y="200" width="400" height="3" rx="1.5" fill="url(#accentGradient)"/>

  <!-- Tagline -->
  <text x="600" y="235" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#64748B" text-anchor="middle" letter-spacing="2">FOUNDATIONAL  •  INTERMEDIATE  •  ADVANCED  •  PRODUCTION</text>
</svg>
